<html>
<head>
    <title>Exemplo de Pilha</title>
</head>
<body>
    <script>
        let pilha = [];

        function push(x) {
            pilha.push(x);
        }

        function pop() {
            if (pilha.length === 0) {
                return 'Pilha Vazia';
            }
            return pilha.pop();
        }

        function peek() {
            if (pilha.length === 0)
                return 'Pilha Vazia';

            return pilha[pilha.length - 1];
        }

        // Testando a pilha
        push('A');
        push('B');
        push('C');

        console.log(peek()); // Mostra 'C' (o último elemento)
        console.log(pop());  // Remove e mostra 'C'
        console.log(pilha);  // Mostra a pilha restante: ['A', 'B']

    </script>
</body>
</html>
