<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<style>
    body{
        font-family: Arial;
        margin: 30px;
    }
    input{
        width: 450px;
    }
    button{
        width: 150px;
    }
    input, button{
        margin: 5px;
        padding: 8px;
    }
    #saida {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
    }

</style>

    <h1>Lista Encadeada (simples)</h1>
    <label for="nome">Digite o nome: </label>
    <input type="text" id="nome" placeholder = "Digite um nome">
    <br>
    <button onclick="adicionarFim()">Adicionar no fim</button>
    <button onclick="adicionarInicio()">Adicionar no Inicio</button>
    <button onclick="removerInicio()">Remover Inicio</button>
    <br>
    <button onclick="contar()">Contar Elementos</button>
    <button onclick="remover()">Remover Elemento</button>
    <button onclick="mostrar()">Mostrar Lista</button>

    <div id="saida"></div>

    <script>
        //lista encadeada

        let valores = [];
        let proximo = [];
        let inicio = -1;
        let ultimo= -1;

        function adicionarFim() {
            let nome = document.getElementById('nome').value;
            if (nome === "") {
                alert("Digite um nome");
                return;
            }
            let novoIndice = valores.length;
            valores.push(nome);
            proximo.push(-1);
            if(inicio === -1) {
                inicio = novoIndice;
                ultimo = novoIndice;
            }
            else {
                proximo[ultimo] = novoIndice;
                ultimo = novoIndice;
            }

            document.getElementById('nome').value = "";
            alert("Elemento Adicionado");
            mostrar();
        }

        function adicionarInicio() {
            let nome = document.getElementById('nome').value;
            if (nome === "") {
                alert("Digite um nome");
                return;
            }
            let novoIndice = valores.length;
            valores.push(nome);
            proximo.push(inicio);
            inicio = novoIndice;
            if(ultimo === -1) {
                ultimo = novoIndice;
            }
            document.getElementById('nome').value = "";
            alert("Elemento Adicionado");
            mostrar();
        }

        function removerInicio() {
            if (inicio === -1) {
                alert("Lista vazia");
                return;
            }
            inicio = proximo[inicio];
            if (inicio === -1) {
                ultimo = -1;
            }
            mostrar();
        }

        function contar() {
            let quantidade = 0;
            let atual = inicio;
            while (atual !== -1) {
                quantidade++;
                atual = proximo[atual];
            }
            document.getElementById('saida').innerHTML = "Quantidade de elementos: " + quantidade;
        }

        function mostrar() {
            let resultado = "";
            let atual = inicio;
        while (atual !== -1) {
            resultado += valores[atual] + " -> ";
            atual = proximo[atual];
        }
        if (inicio === -1) {
                resultado = "Lista Vazia";
            }
            else {
                resultado += "null";
            }

            document.getElementById('saida').innerHTML = resultado;

        }

    </script>

</body>
</html>
